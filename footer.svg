  </defs>
  <rect width="1200" height="220" fill="url(#grad)"/>
  
  <path class="wave" opacity="0.4" d="M0,0 L1200,0 L1200,60 C1050,65 950,25 900,30 C600,105 300,0 0,75 Z" />
  <path class="wave" opacity="0.25" d="M0,0 L1200,0 L1200,45 C1100,60 1000,15 700,75 C400,15 200,75 0,35 Z" />
  <path class="wave" d="M0,0 L1200,0 L1200,22 C1050,30 850,7 600,37 C350,7 150,45 0,30 Z" />

