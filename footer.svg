  <text x="600" y="175" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" fill="#ffffff" opacity="0.9" text-anchor="middle">If you like my work, consider ⭐ starring my repositories.</text>
</svg>
